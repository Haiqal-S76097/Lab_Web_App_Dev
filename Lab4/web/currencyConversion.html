<!DOCTYPE html>
<html>
<head>
    <title>Currency Conversion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Use JSP Declaration Tag, JSP Scriptlet and JSP Expression in Application</h1>

    <div class="card">
        <h2 class="form-title">Currency Conversion</h2>

        <form action="processCurrency.jsp" method="post">

            <div class="form-group">
                <label>Amount (in RM)</label>
                <input type="number" name="amount" placeholder="Enter amount" required>
            </div>

            <div class="form-group">
                <label>Convert to</label>
                <select name="currencyType">
                    <option value="1">USD</option>
                    <option value="2">EURO</option>
                    <option value="3">JPY</option>
                    <option value="4">SGD</option>
                </select>
            </div>

            <div class="button-group">
                <input type="submit" value="Submit" class="btn btn-submit">
                <input type="reset" value="Cancel" class="btn btn-cancel">
            </div>

        </form>
    </div>

</div>

</body>
</html>
